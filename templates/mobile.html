<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Helcyon</title>
  <script>
const marked={parse:function(txt){
  if(!txt)return '';
  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function inline(s){
    // Markdown links FIRST (before esc/emphasis) so URL contents (underscores/
    // asterisks) and the link text survive intact. ⚠️ Hardening — output goes
    // straight into innerHTML with no sanitiser: http/https ONLY (any other
    // scheme is left as literal text, blocking javascript:/data:/file:), every
    // anchor gets target="_blank" rel="noopener noreferrer", and href + label are
    // HTML-escaped. The wrapped form ([text](url)) keeps its outer parens literal
    // — the regex matches only the inner [text](url).
    const _links=[];
    s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,function(m,label,url){
      url=url.trim();
      if(!/^https?:\/\//i.test(url))return m;
      const href=url.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const ph='\x00LINK'+_links.length+'\x00';
      _links.push('<a href="'+href+'" target="_blank" rel="noopener noreferrer">'+esc(label)+'</a>');
      return ph;
    });
    // Preserve <br> tags before escaping, restore after
    const brPlaceholder='\x00BR\x00';
    s=s.replace(/<br\s*\/?>/gi,brPlaceholder);
    s=esc(s);
    s=s.replace(new RegExp(brPlaceholder,'g'),'<br>');
    s=s.replace(/[*][*][*]([^*]+)[*][*][*]/g,'<strong><em>$1</em></strong>');
    s=s.replace(/[*][*]([^*\n]+)[*][*]/g,'<strong>$1</strong>');
    s=s.replace(/[*]([^*\n]+)[*]/g,'<em>$1</em>');
    s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
    // Autolink bare http(s) URLs (GFM-style), matching desktop marked gfm:true.
    // Runs on escaped text; markdown links are already placeholdered out above,
    // so this only touches raw URLs the model/search results emitted unwrapped.
    // Same hardening as the wrapped form: http/https only, target/rel set.
    s=s.replace(/https?:\/\/[^\s<]+/gi,function(url){
      // Trailing sentence punctuation isn't part of the URL — leave it literal.
      let trail='';
      const tm=url.match(/[)\]}.,;:!?'"]+$/);
      if(tm){trail=tm[0];url=url.slice(0,-trail.length);}
      // GFM paren-balancing: a ')' belongs to the URL if it matches an unbalanced
      // '(' inside it (e.g. Wikipedia "..._(disambiguation)" links).
      while(trail.charAt(0)===')'&&(url.split('(').length>url.split(')').length)){
        url+=')';trail=trail.slice(1);
      }
      const href=url.replace(/"/g,'&quot;');
      return '<a href="'+href+'" target="_blank" rel="noopener noreferrer">'+url+'</a>'+trail;
    });
    if(_links.length){s=s.replace(/\x00LINK(\d+)\x00/g,function(_,i){return _links[+i];});}
    return s;
  }
  // Handle fenced code blocks before splitting into paragraphs
  txt=txt.replace(/```(\w*)\n?([\s\S]*?)```/g,function(_,lang,code){
    const escaped=esc(code.replace(/^\n|\n$/g,''));
    const langLabel=lang?'<span class="m-code-lang">'+lang+'</span>':'';
    return '<div class="m-code-wrap">'+
      '<div class="m-code-hdr">'+langLabel+'<button class="m-copy-btn" onclick="mCopyCode(this)">Copy</button></div>'+
      '<pre><code>'+escaped+'</code></pre></div>';
  });
  txt=txt.replace(/^[ \t]*([-*_]{3,})[ \t]*$/gm,'\n\n$1\n\n');
  let blocks=txt.split(/\n\n+/);
  let html='';
  blocks.forEach(function(block){
    // Pass through already-rendered code block divs unchanged
    if(block.trimStart().startsWith('<div class="m-code-wrap">')){html+=block;return;}
    let lines=block.split('\n').filter(function(l){return l.trim()!=='';});
    if(!lines.length)return;
    let first=lines[0];
    if(/^(\s*[-*_]){3,}\s*$/.test(first)&&lines.length===1){html+='<hr>';return;}
    let hm=first.match(/^(#{1,3}) (.+)/);
    if(hm){html+='<strong>'+inline(hm[2])+'</strong>';return;}
    if(lines.every(function(l){return /^[-*+] /.test(l);})){
      html+='<ul>'+lines.map(function(l){return '<li>'+inline(l.replace(/^[-*+] /,''))+'</li>';}).join('')+'</ul>';return;
    }
    if(lines.every(function(l){return /^\d+\.\s/.test(l);})){
      html+='<ol>'+lines.map(function(l){return '<li>'+inline(l.replace(/^\d+\.\s/,''))+'</li>';}).join('')+'</ol>';return;
    }
    html+='<p>'+inline(lines.join('<br>'))+'</p>';
  });
  return html;
}};
</script>

  <style>
    :root {
      --bg: #0d0f14; --surface: #141820; --surface2: #1a1f2a; --border: #2a3040;
      --accent: #4a7fc1; --text: #e0e6f0; --text-dim: #7a8a9a;
      --user-bg: #1a2a3a; --user-border: #2a4a6a; --ai-bg: #141820; --ai-border: #2a3040;
      --ptt-idle: #1a2a3a; --ptt-active: #c14a4a; --ptt-processing: #8a6a1a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { height: 100%; }
    body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; overflow: hidden; }
    #app { display: flex; flex-direction: column; position: fixed; top: 0; left: 0; right: 0; bottom: 0; }
    #header { flex-shrink: 0; display: flex; flex-direction: column; gap: 0; background: var(--surface); border-bottom: 1px solid var(--border); padding-top: max(0px, env(safe-area-inset-top)); }
    #header-row1 { display: flex; align-items: center; gap: 10px; padding: 10px 14px 6px; }
    #header-row2 { display: flex; align-items: center; gap: 8px; padding: 0 14px 10px; flex-wrap: nowrap; overflow-x: auto; }
    #header-avatar { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); background: var(--surface2); flex-shrink: 0; }
    #header-info { flex: 1; min-width: 0; }
    #header-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #header-status { font-size: 11px; color: var(--text-dim); }
    #char-select { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 12px; padding: 5px 8px; max-width: 110px; cursor: pointer; outline: none; }
    #char-select option { background: var(--surface2); }
    #proj-select option { background: var(--surface2); }
    #proj-select.active { color: var(--accent); border-color: var(--accent); }
    #tts-toggle { flex-shrink: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; color: var(--text-dim); font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
    #tts-toggle.active { border-color: var(--accent); color: var(--accent); background: rgba(74,127,193,0.1); }
    #chat { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 6px; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
    .msg-wrap { display: flex; flex-direction: column; gap: 2px; max-width: 88%; }
    .msg-wrap.user { align-self: flex-end; align-items: flex-end; }
    .msg-wrap.ai { align-self: flex-start; align-items: flex-start; }
    .msg-sender { font-size: 11px; color: var(--text-dim); padding: 0 4px; }
    .msg-bubble { padding: 9px 13px; border-radius: 16px; line-height: 1.4; word-break: break-word; font-size: 15px; }
    .user .msg-bubble { background: var(--user-bg); border: 1px solid var(--user-border); border-bottom-right-radius: 4px; color: #b8d4f0; }
    .ai .msg-bubble { background: var(--ai-bg); border: 1px solid var(--ai-border); border-bottom-left-radius: 4px; }
    .msg-time { font-size: 10px; color: #444; padding: 0 4px; }
    #typing-indicator { display: none; align-self: flex-start; padding: 10px 16px; background: var(--ai-bg); border: 1px solid var(--border); border-radius: 16px; border-bottom-left-radius: 4px; }
    #typing-indicator span { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); margin: 0 2px; animation: bounce 1.2s infinite ease-in-out; }
    #typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    #typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
    #input-area { flex-shrink: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 10px 14px; padding-bottom: max(10px, env(safe-area-inset-bottom)); display: flex; flex-direction: column; gap: 8px; }
    #text-row { display: flex; gap: 8px; align-items: flex-end; }
    #user-text { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 9px 13px; color: var(--text); font-size: 15px; resize: none; max-height: 80px; min-height: 40px; outline: none; font-family: inherit; line-height: 1.4; }
    #user-text:focus { border-color: var(--accent); }
    #user-text::placeholder { color: var(--text-dim); }
    #send-btn { flex-shrink: 0; width: 40px; height: 40px; border-radius: 50%; background: var(--accent); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    #send-btn:active { transform: scale(0.9); }
    #ptt-btn { width: 100%; height: 58px; border-radius: 12px; background: var(--ptt-idle); border: 2px solid var(--border); color: var(--text-dim); font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.15s; -webkit-user-select: none; user-select: none; position: relative; overflow: hidden; }
    #ptt-btn.recording { background: var(--ptt-active); border-color: #e06a6a; color: white; animation: pulse-red 1s infinite; }
    #ptt-btn.processing { background: var(--ptt-processing); border-color: #c09a2a; color: #f0d070; }
    @keyframes pulse-red { 0%,100%{box-shadow:0 0 0 0 rgba(193,74,74,0.4)} 50%{box-shadow:0 0 0 8px rgba(193,74,74,0)} }
    .mic-svg { flex-shrink: 0; }
    #waveform { display: none; gap: 3px; align-items: center; height: 18px; }
    #waveform.active { display: flex; }
    #waveform span { display: block; width: 3px; border-radius: 3px; background: white; animation: wave 0.8s infinite ease-in-out; }
    #waveform span:nth-child(1){height:7px;animation-delay:0s} #waveform span:nth-child(2){height:14px;animation-delay:0.1s} #waveform span:nth-child(3){height:18px;animation-delay:0.2s} #waveform span:nth-child(4){height:12px;animation-delay:0.3s} #waveform span:nth-child(5){height:8px;animation-delay:0.4s}
    @keyframes wave { 0%,100%{transform:scaleY(0.5)} 50%{transform:scaleY(1)} }
    #toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(10px); background: rgba(30,35,50,0.95); border: 1px solid var(--border); color: var(--text); padding: 7px 16px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none; white-space: nowrap; z-index: 9999; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    @keyframes replayPulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .msg-bubble p { margin: 0 0 16px 0; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble em { font-style: italic; color: #9bb; }
    .msg-bubble hr { border: none; border-top: 1px solid var(--border); margin: 5px 0; opacity: 0.6; }
    .msg-bubble ul, .msg-bubble ol { margin: 0.3em 0 1.3em 0; padding-left: 1.5em; line-height: 1.4; }
    .msg-bubble li { margin: 0 0 0.15em 0; }
    .msg-bubble strong { color: #d0e4f8; }
    .msg-bubble code { background: var(--surface2); padding: 1px 5px; border-radius: 4px; font-size: 13px; font-family: monospace; }
    .m-code-wrap { margin: 6px 0; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
    .m-code-hdr { display: flex; align-items: center; justify-content: space-between; padding: 4px 10px; background: rgba(0,0,0,0.4); min-height: 28px; }
    .m-code-lang { font-size: 11px; color: #888; font-family: monospace; }
    .m-copy-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #aaa; border-radius: 4px; padding: 3px 10px; font-size: 11px; cursor: pointer; margin-left: auto; }
    .m-code-wrap pre { margin: 0; padding: 10px 12px; background: #0d0f14; overflow-x: auto; border-radius: 0; font-size: 13px; line-height: 1.5; }
    .m-code-wrap pre code { background: none; padding: 0; font-size: 13px; }
    .msg-bubble strong { color: #dde; font-weight: 600; }
    .msg-bubble br { display: block; content: ''; margin: 2px 0; }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <!-- Row 1: Avatar, name/status, TTS -->
    <div id="header-row1">
      <img id="header-avatar" src="/static/images/default.png" alt="" onerror="this.src='/static/images/default.png'" />
      <div id="header-info">
        <div id="header-name">Helcyon</div>
        <div id="header-status">Ready</div>
      </div>
      <button id="mobile-backend-btn" onclick="openBackendPicker()" title="Choose backend (Local / OpenAI / Anthropic)" style="flex-shrink:0;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 9px;color:var(--text-dim);font-size:15px;cursor:pointer;line-height:1;">🔌</button>
      <button id="tts-toggle" onclick="toggleTTS()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07M18.36 5.64a9 9 0 0 1 0 12.73"/></svg>
        <span id="tts-label">TTS</span>
      </button>
      <button onclick="openModelPicker()" title="Switch Model" style="flex-shrink:0;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 9px;color:var(--text-dim);font-size:16px;cursor:pointer;line-height:1;">🧠</button>
      <button onclick="endSession()" title="End Session" style="flex-shrink:0;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 9px;color:var(--text-dim);font-size:16px;cursor:pointer;line-height:1;">💾</button>
    </div>
    <!-- Row 2: Character + Project selectors -->
    <div id="header-row2">
      <small style="color:var(--text-dim);font-size:10px;letter-spacing:0.4px;flex-shrink:0;">CHAR</small>
      <select id="char-select" onchange="switchCharacter(this.value)" style="flex:1;min-width:0;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;padding:5px 8px;cursor:pointer;outline:none;"><option value="">Loading...</option></select>
      <small style="color:var(--text-dim);font-size:10px;letter-spacing:0.4px;flex-shrink:0;">PROJECT</small>
      <select id="proj-select" onchange="switchProject(this.value)" style="flex:1;min-width:0;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text-dim);font-size:12px;padding:5px 8px;cursor:pointer;outline:none;">
        <option value="">No Project</option>
      </select>
    </div>
  </div>
  <!-- Active cloud-backend banner — sits between header and chat. Colour/label
       adapt to the active provider (OpenAI green / Anthropic amber) in JS. -->
  <div id="mobile-cloud-banner" style="display:none;border-bottom:1px solid transparent;padding:5px 14px;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0;">
    <div style="display:flex;align-items:center;gap:7px;">
      <span id="mobile-cloud-dot" style="width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;"></span>
      <span id="mobile-cloud-label" style="font-size:12px;font-weight:600;"></span>
      <span id="mobile-cloud-model" style="font-size:11px;"></span>
    </div>
    <button onclick="disconnectMobileCloud()" style="background:rgba(200,50,50,0.25);border:1px solid rgba(200,80,80,0.4);color:#e88;border-radius:6px;padding:2px 8px;font-size:11px;cursor:pointer;">Disconnect</button>
  </div>
  <div id="chat"><div id="typing-indicator"><span></span><span></span><span></span></div></div>
  <div id="input-area">
    <div id="text-row">
      <textarea id="user-text" placeholder="Type a message..." rows="1" oninput="autoResize(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendText();}"></textarea>
      <button id="send-btn" onclick="sendText()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div id="resume-row" style="display:flex;gap:6px;padding:0 0 4px;">
      <button onclick="regenerateLastResponse()" style="flex:1;background:rgba(80,55,25,0.3);border:1px solid #6a4a2a;color:#f5b14a;border-radius:8px;padding:5px 0;font-size:12px;cursor:pointer;">🔁 Regen</button>
      <button onclick="resumeLastResponse()" style="flex:1;background:rgba(40,80,120,0.3);border:1px solid #2a4a6a;color:#7ab4f5;border-radius:8px;padding:5px 0;font-size:12px;cursor:pointer;">🔄 Resume</button>
      <button onclick="continueResponse()" style="flex:1;background:rgba(40,60,40,0.3);border:1px solid #2a4a2a;color:#6dbf8a;border-radius:8px;padding:5px 0;font-size:12px;cursor:pointer;">▶ Continue</button>
    </div>
    <button id="ptt-btn" onclick="toggleMic()">
      <svg class="mic-svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      <div id="waveform"><span></span><span></span><span></span><span></span><span></span></div>
      <span id="ptt-label">Tap to Talk</span>
    </button>
  </div>
  <!-- Chat List Panel (inline, sits below header inside #app flex column) -->
  <div id="chat-panel" style="display:none;flex:1;flex-direction:column;overflow:hidden;background:var(--bg);">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0;">
      <strong style="font-size:15px;">Chats</strong>
      <div style="display:flex;gap:8px;align-items:center;">
        <select id="mobile-sort-select" onchange="saveMobileSortPref(this.value);loadChatList()" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;padding:5px 8px;cursor:pointer;">
          <option value="recent">Most Recent</option>
          <option value="created">Date Created</option>
          <option value="az">A-Z</option>
        </select>
        <button onclick="newMobileChat()" style="background:var(--accent);border:none;border-radius:8px;color:white;padding:6px 12px;font-size:13px;cursor:pointer;">＋ New</button>
        <button onclick="clearMobileChat()" style="background:#3a1a1a;border:1px solid #6a2a2a;color:#e88;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;">🗑 Clear</button>
      </div>
    </div>
    <div id="chat-list-items" style="overflow-y:auto;flex:1;padding:8px 0;"></div>
  </div>
</div>

<!-- OpenAI Confirmation Modal -->
<!-- Backend picker bottom-sheet: Local / OpenAI / Anthropic -->
<div id="mobile-backend-modal" style="display:none;position:fixed;inset:0;z-index:9500;background:rgba(0,0,0,0.75);align-items:flex-end;justify-content:center;" onclick="if(event.target===this)closeBackendPicker()">
  <div style="background:var(--surface);border:1px solid var(--border);border-top-left-radius:16px;border-top-right-radius:16px;padding:16px 14px calc(20px + env(safe-area-inset-bottom));width:100%;max-width:520px;box-shadow:0 -8px 32px rgba(0,0,0,0.6);">
    <div style="font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:12px;text-align:center;">Choose backend</div>
    <button onclick="selectMobileBackend('local')" style="display:flex;align-items:center;justify-content:space-between;width:100%;padding:13px 14px;margin-bottom:8px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;cursor:pointer;">
      <span>🖥️ Local <small style="color:var(--text-dim);font-size:11px;">llama.cpp</small></span>
      <span id="backend-check-local" style="color:#6f6;font-weight:bold;"></span>
    </button>
    <button onclick="selectMobileBackend('openai')" style="display:flex;align-items:center;justify-content:space-between;width:100%;padding:13px 14px;margin-bottom:8px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;cursor:pointer;">
      <span>☁️ OpenAI</span>
      <span id="backend-check-openai" style="color:#4dffaa;font-weight:bold;"></span>
    </button>
    <button onclick="selectMobileBackend('anthropic')" style="display:flex;align-items:center;justify-content:space-between;width:100%;padding:13px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;cursor:pointer;">
      <span>🧠 Anthropic</span>
      <span id="backend-check-anthropic" style="color:#e0a060;font-weight:bold;"></span>
    </button>
    <button onclick="closeBackendPicker()" style="width:100%;padding:11px 0;margin-top:12px;background:transparent;border:none;color:var(--text-dim);font-size:13px;cursor:pointer;">Cancel</button>
  </div>
</div>

<!-- Cloud-connect data-warning confirm (shared by OpenAI + Anthropic) -->

<div id="toast"></div>
<script>
let characterName='Assistant',charFilename='Assistant',userName='User',chatHistory=[],ttsEnabled=false,ttsVoice=null,mobileChatFilename=null;
let mediaRecorder=null,audioChunks=[],isRecording=false;
let ttsQueue=[],ttsProcessing=false,currentAudio=null,isPlayingAudio=false,ttsOnComplete=null;
let mobileTTSEngine='f5',mobileQwenCtx=null,mobileQwenNext=0,mobileQwenSources=[],mobileQwenAbort=null,mobileQwenLiveRun=0;
let replayTimeout=null;
let ttsSentenceBuffer='',ttsStreamingComplete=false;
// Code-block stripping state — persists across streaming chunks so a fenced
// ```...``` block that spans multiple chunks is fully suppressed.
let ttsInsideCodeBlock=false,ttsBacktickTail='';
// Streaming sentence batcher — accumulates detected sentences before
// queuing so each TTS request carries enough prosodic context. Without
// this, F5 receives one-sentence-at-a-time requests during streaming
// (often 20–60 chars) and the audio sounds clipped/lower quality than
// the Replay path which sends full multi-sentence lines.
let ttsPendingBatch='',ttsFirstBatchSent=false;
const TTS_START_THRESHOLD=1;
let TTS_MAX_CHUNK_LENGTH=300;
// Streaming batch thresholds — first batch shorter so audio starts fast,
// subsequent batches longer for smooth prosody. Engine-aware: re-tuned
// in initTTSEngine() once the active engine is known.
let TTS_FIRST_BATCH_MIN=80;
let TTS_BATCH_MIN=180;

function fixViewport(){const h=window.visualViewport?window.visualViewport.height:window.innerHeight;document.getElementById('app').style.height=h+'px';}
function mCopyCode(btn){const code=btn.closest('.m-code-wrap').querySelector('code');if(!code)return;navigator.clipboard.writeText(code.innerText).then(function(){btn.textContent='✓ Copied';btn.style.color='#6f6';setTimeout(function(){btn.textContent='Copy';btn.style.color='';},1800);}).catch(function(){btn.textContent='✗ Failed';setTimeout(function(){btn.textContent='Copy';},1800);});}
if(window.visualViewport){window.visualViewport.addEventListener('resize',fixViewport);window.visualViewport.addEventListener('scroll',fixViewport);}
window.addEventListener('resize',fixViewport);
fixViewport();

window.addEventListener('DOMContentLoaded',async()=>{
  await loadUserName();await loadCharacterList();await loadProjects();loadTTSPrefs();
  initTTSEngine();
  checkMobileBackend();
  // Push initial state so back button has somewhere to go
  history.replaceState({view:'chatlist'},'');
  await openChatList();
  scrollToBottom();
});

// Back button intercept — go to chat list if in a chat, otherwise let browser handle it
window.addEventListener('popstate',async(e)=>{
  const panel=document.getElementById('chat-panel');
  if(panel.style.display==='none'){
    // We're in a chat — go back to list
    history.pushState({view:'chatlist'},'');
    await openChatList();
  }
});

// Stop audio when app goes to background or tab is hidden
document.addEventListener('visibilitychange',()=>{if(document.hidden)stopAllAudio();});
// Stop audio when page is unloaded (browser close, navigation away)
window.addEventListener('pagehide',()=>stopAllAudio());

// Persist the active character to shared server-side state so the choice
// follows the user between the desktop and mobile apps. Fire-and-forget.
function setActiveCharacterServer(name){
  if(!name)return;
  fetch('/active_character',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({active_character:name})}).catch(e=>console.warn('active_character save failed',e));
}

async function loadCharacterList(){
  try{
    const res=await fetch('/list_characters');
    if(!res.ok)return;
    const data=await res.json();
    const chars=Array.isArray(data)?data:(data.characters||[]);
    const sel=document.getElementById('char-select');
    sel.innerHTML='';
    chars.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);});
    // Initial character: server-side active character (shared with desktop)
    // → per-device localStorage → first in list.
    let activeChar=null;
    try{const acR=await fetch('/active_character');if(acR.ok)activeChar=(await acR.json()).active_character;}
    catch(e){console.warn('active_character fetch failed',e);}
    const saved=localStorage.getItem('lastCharacter');
    if(activeChar&&chars.includes(activeChar)){characterName=activeChar;}
    else if(saved&&chars.includes(saved)){characterName=saved;}
    else if(chars.length>0){characterName=chars[0];}
    if(characterName){sel.value=characterName;}
    await loadCharacterInfo(characterName);
    setActiveCharacterServer(characterName);
  }catch(e){console.warn('char list error',e);}
}

async function switchCharacter(name){
  if(window._mobilePreferredModelLoading)return;
  if(!name)return;
  characterName=name;
  localStorage.setItem('lastCharacter',name);
  setActiveCharacterServer(name);
  chatHistory=[];
  mobileChatFilename=null;
  localStorage.removeItem('mobile_chat_filename');
  localStorage.removeItem('mobile_chat_character');
  document.getElementById('chat').innerHTML='<div id="typing-indicator"><span></span><span></span><span></span></div>';
  await loadCharacterInfo(name);
  showToast('Switched to '+name);
}

async function loadCharacterInfo(charName){
  try{
    let res=await fetch('/get_character/'+encodeURIComponent(charName));
    if(!res.ok) res=await fetch('/get_character/'+encodeURIComponent(charName.toLowerCase()));
    if(res.ok){
      const d=await res.json();
      characterName=d.name||charName;
      charFilename=charName;
      document.getElementById('header-name').textContent=characterName;
      document.getElementById('header-avatar').src='/static/images/'+(d.image||charName+'.png');
      document.getElementById('header-avatar').onerror=function(){this.src='/static/images/default.png';};
      await loadMobileCharacterPreferredModel(d);
      // Restore this character's voice — check server first (shared with PC), fallback to localStorage
      try{
        const vr=await fetch('/character_voice/'+encodeURIComponent(charName));
        if(vr.ok){
          const vd=await vr.json();
          const serverVoice=vd.voice;
          const localVoice=localStorage.getItem('tts-voice-'+charName);
          const voice=serverVoice||localVoice||null;
          if(voice){
            ttsVoice=voice;
            localStorage.setItem('tts-voice',voice);
            localStorage.setItem('tts-voice-'+charName,voice);
            const sel=document.getElementById('mobile-voice-select');
            if(sel&&sel.options.length>0)sel.value=voice;
          }
        }
      }catch(e){}
    }else{
      document.getElementById('header-name').textContent=charName;
    }
  }catch(e){console.warn('loadCharacterInfo error',e);}
}

function mobilePreferredModelName(modelId){
  return String(modelId||'').split(/[\\/]/).pop().replace(/\.gguf$/i,'');
}

function showMobilePreferredModelLoadingOverlay(modelName,charName){
  const overlay=document.getElementById('mobile-preferred-model-loading-overlay');
  const detail=document.getElementById('mobile-preferred-model-loading-detail');
  window._mobilePreferredModelLoading=true;
  if(detail)detail.textContent='Loading '+modelName+' for '+(charName||'character')+'...';
  if(overlay){overlay.style.display='flex';overlay.focus();}
}

function hideMobilePreferredModelLoadingOverlay(){
  const overlay=document.getElementById('mobile-preferred-model-loading-overlay');
  if(overlay)overlay.style.display='none';
  window._mobilePreferredModelLoading=false;
}

async function loadMobileCharacterPreferredModel(characterData){
  const preferred=String((characterData&&characterData.preferred_model_id)||'').trim();
  if(!preferred)return true;
  const displayName=mobilePreferredModelName(preferred);
  const preferredId=preferred.replace(/\\/g,'/').toLowerCase();
  const rememberedId=String(localStorage.getItem('llama_last_model')||'').replace(/\\/g,'/').toLowerCase();
  let overlayShown=false;
  if(!rememberedId||rememberedId!==preferredId){
    showMobilePreferredModelLoadingOverlay(displayName,characterData.name);
    overlayShown=true;
  }
  try{
    const currentRes=await fetch('/get_model');
    if(currentRes.ok){
      const current=await currentRes.json();
      const currentId=String(current.model_id||'').replace(/\\/g,'/').toLowerCase();
      const sameModel=currentId?currentId===preferredId:mobilePreferredModelName(current.model).toLowerCase()===displayName.toLowerCase();
      if(sameModel){localStorage.setItem('llama_last_model',preferred);return true;}
    }
    if(!overlayShown){showMobilePreferredModelLoadingOverlay(displayName,characterData.name);overlayShown=true;}
    const loaded=await loadModel(preferred,displayName);
    showToast(loaded?'Loaded '+displayName:'Could not load preferred model');
    return loaded;
  }catch(e){
    console.warn('Preferred model load failed',e);
    showToast('Could not load preferred model');
    return false;
  }finally{
    if(overlayShown)hideMobilePreferredModelLoadingOverlay();
  }
}

async function loadUserName(){try{const r=await fetch('/get_active_user');if(r.ok){const d=await r.json();userName=d.active_user||d.name||'User';}}catch(e){}}

function loadTTSPrefs(){ttsEnabled=localStorage.getItem('tts-enabled')==='true';ttsVoice=localStorage.getItem('tts-voice')||null;updateTTSButton();}
function toggleTTS(){unlockAudio();ttsEnabled=!ttsEnabled;localStorage.setItem('tts-enabled',ttsEnabled);updateTTSButton();showToast(ttsEnabled?'🔊 TTS On':'🔇 TTS Off');}
function updateTTSButton(){const b=document.getElementById('tts-toggle');b.classList.toggle('active',ttsEnabled);document.getElementById('tts-label').textContent=ttsEnabled?'TTS On':'TTS';}

// Unlock audio context on first interaction (mobile autoplay policy)
let audioUnlocked=false;
async function unlockAudio(){
  if(audioUnlocked)return;
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const buf=ctx.createBuffer(1,1,22050);
    const src=ctx.createBufferSource();
    src.buffer=buf;src.connect(ctx.destination);src.start(0);
    await ctx.resume();
    audioUnlocked=true;
    console.log('🔊 Audio unlocked');
  }catch(e){console.warn('Audio unlock failed:',e);}
}

function toggleMic(){
  unlockAudio();
  showToast('toggleMic called, isRecording='+isRecording);
  if(isRecording){
    isRecording=false;
    setPTTState('processing');
    setStatus('Transcribing...');
    // Directly process whatever chunks we have, don't wait for onstop
    setTimeout(()=>processAudioChunks(), 300);
    // Also try to stop the recorder to free the mic
    try{if(mediaRecorder&&mediaRecorder.state==='recording')mediaRecorder.stop();}catch(e){}
  }else{
    if(ttsEnabled)stopAllAudio();
    startRecording();
  }
}

async function startRecording(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    // Pick a MIME type the browser actually supports
    const mimeTypes=['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4',''];
    let mimeType='';
    for(const m of mimeTypes){
      if(m===''||MediaRecorder.isTypeSupported(m)){mimeType=m;break;}
    }
    console.log('Using MIME type:',mimeType||'(browser default)');
    showToast('Mic: '+(mimeType||'default'));
    mediaRecorder=mimeType?new MediaRecorder(stream,{mimeType}):new MediaRecorder(stream);
    audioChunks=[];
    mediaRecorder.ondataavailable=(ev)=>{if(ev.data&&ev.data.size>0){audioChunks.push(ev.data);console.log('chunk:',ev.data.size);}};
    mediaRecorder.onerror=(ev)=>{console.error('MediaRecorder error',ev);showToast('⚠️ Mic error');isRecording=false;setPTTState('idle');setStatus('Ready');};
    mediaRecorder.start(250);
    isRecording=true;setPTTState('recording');setStatus('Listening...');
  }catch(err){
    console.error('Mic start error:',err);
    showToast('⚠️ Mic error: '+err.message);
    setPTTState('idle');
  }
}

async function processAudioChunks(){
  if(audioChunks.length===0){showToast('No audio captured');setStatus('Ready');setPTTState('idle');return;}
  const mimeType=(mediaRecorder&&mediaRecorder.mimeType)||'audio/webm';
  const blob=new Blob(audioChunks,{type:mimeType});
  console.log('Audio blob:',blob.size,'bytes,',audioChunks.length,'chunks, mime:',mimeType);
  showToast('Blob: '+blob.size+'b mime:'+mimeType.split(';')[0]);
  if(blob.size<100){showToast('Audio too short');setStatus('Ready');setPTTState('idle');if(mediaRecorder&&mediaRecorder.stream)mediaRecorder.stream.getTracks().forEach(t=>t.stop());return;}
  const form=new FormData();const ext=mimeType.includes('mp4')?'mp4':mimeType.includes('ogg')?'ogg':'webm';
  form.append('audio',blob,'recording.'+ext);
  try{
    setStatus('Sending to Whisper...');
    const res=await fetch('/api/whisper/transcribe',{method:'POST',body:form});
    if(!res.ok){showToast('⚠️ Whisper error '+res.status);setStatus('Ready');setPTTState('idle');return;}
    const data=await res.json();
    if(data.transcript&&data.transcript.trim()){
      showToast('Heard: '+data.transcript.trim().substring(0,40));
      await sendMessage(data.transcript.trim());
    }else{showToast('Nothing heard — try again');setStatus('Ready');setPTTState('idle');}
  }catch(err){
    console.error('Whisper error:',err);
    showToast('⚠️ Whisper failed: '+err.message);
    setStatus('Ready');setPTTState('idle');
  }
  if(mediaRecorder&&mediaRecorder.stream)mediaRecorder.stream.getTracks().forEach(t=>t.stop());
}

async function stopRecording(){
  // Legacy - not used in main flow anymore
  try{if(mediaRecorder&&mediaRecorder.state==='recording')mediaRecorder.stop();}catch(e){}
}

function setPTTState(state){
  const btn=document.getElementById('ptt-btn'),lbl=document.getElementById('ptt-label'),wave=document.getElementById('waveform'),mic=btn.querySelector('.mic-svg');
  btn.classList.remove('recording','processing');
  if(state==='recording'){btn.classList.add('recording');wave.classList.add('active');mic.style.display='none';lbl.textContent='Release to Send';}
  else if(state==='processing'){btn.classList.add('processing');wave.classList.remove('active');mic.style.display='';lbl.textContent='Thinking...';}
  else{wave.classList.remove('active');mic.style.display='';lbl.textContent='Tap to Talk';}
}

async function sendText(){const ta=document.getElementById('user-text');const text=ta.value.trim();if(!text)return;ta.value='';ta.style.height='';await sendMessage(text);}

function saveDocumentIntentGate(userMsg){
  if(!userMsg||typeof userMsg!=='string')return false;
  const SAVE_DOC_RE=/\b(?:save|write|turn|make|convert|store|put)\b.{0,80}\b(?:as|to|into|in)\b.{0,30}\b(?:a\s+)?(?:global\s+)?(?:reference\s+)?doc(?:ument)?\b|\b(?:save|write|store)\s+(?:that|this|it)\s+(?:as|to|into)\s+(?:a\s+)?(?:global\s+)?(?:reference\s+)?doc(?:ument)?\b/i;
  return SAVE_DOC_RE.test(userMsg);
}

function memoryIntentGate(userMsg){
  if(!userMsg||typeof userMsg!=='string')return false;
  const text=userMsg.replace(/\r\n/g,'\n').trim();
  const compact=text.replace(/\s+/g,' ');
  if(!compact)return false;
  const MEMORY_INTENT_RE=/\b(?:remember (?:this|that|it|to|my|the)|save (?:this|that|it)(?: to (?:your )?memory)?|save .{0,80}for (?:later|future reference)|(?:make|take) a note|don['’]?t forget|for (?:future|later) reference|add (?:(?:this|that|it) )?to (?:your )?memory|note this down|keep (?:this|that|it) in mind|save to (?:your )?memory|put (?:it |this |that )?(?:in(?:to)?|to) (?:your )?memory|(?:can you )?memorize (?:this|that|it)|keep a record|log (?:this|that|it)|store (?:this|that|it)(?: in memory)?|jot (?:this|that|it) down|note (?:this|that|it) down|(?:please )?save (?:this|that|it))\b/i;
  const LEADING_MEMORY_INTENT_RE=/^(?:please\s+|can you\s+|could you\s+|would you\s+|i want you to\s+)?(?:remember (?:this|that|it|to|my|the)|save (?:this|that|it)(?: to (?:your )?memory)?|save .{0,80}for (?:later|future reference)|(?:make|take) a note|don['â€™]?t forget|for (?:future|later) reference|add (?:(?:this|that|it) )?to (?:your )?memory|note this down|keep (?:this|that|it) in mind|save to (?:your )?memory|put (?:it |this |that )?(?:in(?:to)?|to) (?:your )?memory|memorize (?:this|that|it)|keep a record|log (?:this|that|it)|store (?:this|that|it)(?: in memory)?|jot (?:this|that|it) down|note (?:this|that|it) down|save (?:this|that|it))\b/i;
  const directCommand = compact.replace(/^(?:(?:please|can you|could you|would you|i want you to)\s+)*/i,'');
  const DIRECT_MEMORY_COMMAND_RE=/^(?:remember (?:this|that|it|to|my|the)|save (?:this|that|it)(?: to (?:your )?memory)?|save .{0,80}for (?:later|future reference)|(?:make|take) a note|don['â€™]?t forget|for (?:future|later) reference|add (?:(?:this|that|it) )?to (?:your )?memory|note this down|keep (?:this|that|it) in mind|save to (?:your )?memory|put (?:it |this |that )?(?:in(?:to)?|to) (?:your )?memory|memorize (?:this|that|it)|keep a record|log (?:this|that|it)|store (?:this|that|it)(?: in memory)?|jot (?:this|that|it) down|note (?:this|that|it) down|save (?:this|that|it))\b/i;
  return DIRECT_MEMORY_COMMAND_RE.test(directCommand);
}

function recentVisibleChatForMemory(){
  return (chatHistory||[]).slice(-8).map(msg=>{
    let content=msg.content;
    if(Array.isArray(content))content=content.filter(p=>p&&p.type==='text').map(p=>p.text||'').join(' ');
    return{role:msg.role,content:String(content||'').trim()};
  }).filter(msg=>(msg.role==='user'||msg.role==='assistant')&&msg.content);
}

function memoryTranscriptFromMessages(messages){
  const speakerFor=(msg)=>msg.role==='user'?userName:characterName;
  return messages.map(msg=>speakerFor(msg)+': '+msg.content).join('\n\n');
}

async function saveMemoryFromChat(commandText){
  const history=recentVisibleChatForMemory();
  if(!history.length){showToast('No conversation to save to memory yet');setStatus('Ready');return;}
  setStatus('Saving memory...');
  showToast('Saving memory...');
  try{
    const res=await fetch('/auto_memory/capture',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({character:charFilename||characterName,user_name:userName,user_text:'remember this',assistant_text:memoryTranscriptFromMessages(history),recent_messages:history,force_save:true})});
    const result=await res.json().catch(()=>({}));
    if(res.ok&&result.status==='saved')showToast('Memory saved: '+(result.title||'Saved memory'));
    else if(result.reason==='duplicate')showToast('That memory is already saved');
    else if(result.reason==='roleplay_project')showToast('Memory saving is disabled in roleplay projects');
    else showToast('Failed to save memory: '+(result.error||result.reason||'unknown error'));
    setStatus('Ready');
    return;
  }catch(e){showToast('⚠️ Error: '+e.message);}
  setStatus('Ready');
}

function recentVisibleChatForDocument(){
  return (chatHistory||[]).slice(-40).map(msg=>{
    let content=msg.content;
    if(Array.isArray(content))content=content.filter(p=>p&&p.type==='text').map(p=>p.text||'').join(' ');
    return{role:msg.role,content:content||''};
  }).filter(msg=>(msg.role==='user'||msg.role==='assistant')&&String(msg.content||'').trim());
}

async function saveAsDocumentFromChat(commandText){
  const history=recentVisibleChatForDocument();
  if(!history.length){showToast('No conversation to save as a document yet');setStatus('Ready');return;}
  setStatus('Saving document...');
  showToast('Saving document...');
  try{
    const res=await fetch('/global_documents/save_from_chat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:history,user_name:userName,instruction:commandText})});
    const data=await res.json().catch(()=>({}));

// Extended-thinking demux — peel Anthropic reasoning sentinels off the answer
// and show them in a small collapsible. Sentinels are STX-delimited (matches
// app.py); built via fromCharCode so the source stays plain ASCII. On every
// other backend these markers never appear, so _mobSplit is a no-op.
var _MSTX=String.fromCharCode(2);
var _M_OPEN=_MSTX+_MSTX+'THINK'+_MSTX+_MSTX, _M_CLOSE=_MSTX+_MSTX+'/THINK'+_MSTX+_MSTX;
function _mobTrail(buf,tok){var max=Math.min(buf.length,tok.length-1);for(var k=max;k>0;k--){if(buf.slice(buf.length-k)===tok.slice(0,k))return k;}return 0;}
function _mobSplit(raw){
  var o=raw.indexOf(_M_OPEN);
  if(o===-1){var hb=_mobTrail(raw,_M_OPEN);return{thinking:'',answer:hb?raw.slice(0,raw.length-hb):raw};}
  var after=o+_M_OPEN.length, before=raw.slice(0,o), c=raw.indexOf(_M_CLOSE,after);
  if(c===-1){var t=raw.slice(after);var h=_mobTrail(t,_M_CLOSE);if(h)t=t.slice(0,t.length-h);return{thinking:t,answer:before};}
  return{thinking:raw.slice(after,c),answer:before+raw.slice(c+_M_CLOSE.length)};
}

async function handleStream(res){
  const reader=res.body.getReader(),decoder=new TextDecoder();let fullText='';let rawAll='';let prevAns=0;let thinkEl=null;
  showTyping(false);
  // Reset TTS buffer for new response
  ttsSentenceBuffer='';ttsStreamingComplete=false;
  ttsPendingBatch='';ttsFirstBatchSent=false;
  ttsInsideCodeBlock=false;ttsBacktickTail='';

  const wrap=document.createElement('div');wrap.className='msg-wrap ai';
  const s=document.createElement('div');s.className='msg-sender';s.textContent=characterName;
  const bubble=document.createElement('div');bubble.className='msg-bubble';
  const textSpan=document.createElement('div');bubble.appendChild(textSpan);
  wrap.appendChild(s);wrap.appendChild(bubble);
  document.getElementById('chat').insertBefore(wrap,document.getElementById('typing-indicator'));

  // HWUI streams raw text chunks — append and buffer for TTS simultaneously
  while(true){
    const{done,value}=await reader.read();
    if(done)break;
    const chunk=decoder.decode(value,{stream:true});
    if(chunk){
      rawAll+=chunk;
      const parts=_mobSplit(rawAll);
      if(parts.thinking){
        if(!thinkEl){
          thinkEl=document.createElement('details');
          thinkEl.open=true;
          thinkEl.style.cssText='margin:0 0 8px 0;border:1px solid rgba(140,140,160,0.3);border-radius:8px;background:rgba(120,120,140,0.08);font-size:0.88em;';
          const sm=document.createElement('summary');
          sm.textContent='💭 Thinking';
          sm.style.cssText='cursor:pointer;padding:6px 10px;color:var(--text-dim);font-weight:600;list-style:none;';
          const bd=document.createElement('div');
          bd.style.cssText='padding:8px 11px;color:var(--text-dim);font-style:italic;white-space:pre-wrap;overflow-wrap:break-word;max-height:280px;overflow-y:auto;line-height:1.5;';
          thinkEl.appendChild(sm);thinkEl.appendChild(bd);thinkEl._body=bd;
          bubble.insertBefore(thinkEl,textSpan);
        }
        thinkEl._body.textContent=parts.thinking;
      }
      const ansDelta=parts.answer.slice(prevAns);
      prevAns=parts.answer.length;
      fullText=parts.answer;
      if(typeof marked!=='undefined'){textSpan.innerHTML=marked.parse(fullText);}
      else{textSpan.textContent=fullText;}
      if(ttsEnabled&&ansDelta)bufferTextForTTS(ansDelta);
      scrollToBottom();
    }
  }
  if(thinkEl)thinkEl.open=false;

  // Replay button — state driven purely by globals (isPlayingAudio, ttsProcessing, replayTimeout)
  // exactly like utils.js. No local flags, no watchers, no callbacks for button state.
  const replayRow2=document.createElement('div');
  replayRow2.style.cssText='display:flex;gap:6px;margin-top:4px;padding:0 4px;';
  const replayBtn2=document.createElement('button');
  replayBtn2.className='mobile-replay-btn';
  replayBtn2.style.cssText='background:none;border:none;color:var(--text-dim);font-size:13px;cursor:pointer;padding:2px 4px;border-radius:4px;display:flex;align-items:center;gap:4px;transition:color 0.2s;';
  const replaySVG='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>';
  const stopSVG='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>';
  replayBtn2.innerHTML=replaySVG+' Replay';

  replayBtn2.onclick=(e)=>{
    e.stopPropagation();
    // Same logic as utils.js replayLastAudio():
    // if anything is playing/queued/pending — stop. Otherwise start.
    if(isPlayingAudio||ttsProcessing||replayTimeout){
      stopAllAudio(); // resets button via querySelector inside stopAllAudio
      return;
    }
    // Mark this button as the active one so stopAllAudio/processQueue can find it
    document.querySelectorAll('.mobile-replay-btn.active').forEach(b=>setReplayBtnIdle(b));
    setReplayBtnActive(replayBtn2);
    replayTimeout=setTimeout(()=>{
      replayTimeout=null;
      const lines=fullText.replace(/\*\*/g,'').replace(/\*/g,'').replace(/_/g,'').replace(/#{1,6}\s/g,'').split('\n');
      for(const line of lines){const t=line.trim();if(t.length>2)splitAndQueue(t);}
      ttsStreamingComplete=true;
      if(ttsQueue.length>0)processQueue();
    },150);
  };

  replayRow2.appendChild(replayBtn2);
  wrap.appendChild(replayRow2);
  const aiTs=new Date().toISOString();
  const ts=document.createElement('div');ts.className='msg-time';ts.textContent=fmtTime(new Date(aiTs));wrap.appendChild(ts);
  attachLongPress(wrap,fullText,'ai');
  if(typeof marked!=='undefined'){textSpan.innerHTML=marked.parse(fullText);}
  chatHistory.push({role:'assistant',content:fullText,speaker:characterName,timestamp:new Date().toISOString()});
  await saveChatToDisk();
  // Auto-name if still a "New Chat" — filename guard prevents re-firing after rename
  if(mobileChatFilename&&mobileChatFilename.includes('New Chat')){
    const firstUserMsg=chatHistory.find(m=>m.role==='user'&&!m.is_opening_line);
    if(firstUserMsg)autoNameMobileChat(firstUserMsg.content||'');
  }
  if(ttsEnabled){
    // Mark button active and flush — button resets when processQueue finishes or stopAllAudio is called
    setReplayBtnActive(replayBtn2);
    flushTTSBuffer();
  }
  setStatus('Ready');scrollToBottom();
}


function speakText(text){
  lastSpokenText=text;
  stopAllAudio();
  const lines=text.replace(/\*\*/g,'').replace(/\*/g,'').replace(/_/g,'').replace(/#{1,6}\s/g,'').split('\n');
  for(const line of lines){const t=line.trim();if(t.length>2)splitAndQueue(t);}
  ttsStreamingComplete=true;
  return new Promise(resolve=>{
    ttsOnComplete=resolve;
    if(ttsQueue.length>0)processQueue();
    else{ttsOnComplete=null;resolve();}
  });
}

function parseDateFromFilename(filename){
  const monthMap={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const match=filename.match(/- ([A-Z][a-z]{2}) (\d{1,2})(?:\s*\(\d+\))?\.txt$/);
  if(match){
    const month=monthMap[match[1]];const day=parseInt(match[2]);
    const year=new Date().getFullYear();
    if(month!==undefined&&!isNaN(day))return new Date(year,month,day).getTime();
  }
  return null;
}

function extractCharFromFilename(filename){
  // Filename format: "CharName - Title - Date.txt"
  const noExt=filename.replace(/\.txt$/,'');
  const parts=noExt.split(' - ');
  if(parts.length>=2){
    // Try longest possible match against known characters first
    const sel=document.getElementById('char-select');
    const knownChars=sel?Array.from(sel.options).map(o=>o.value):[];
    for(let i=parts.length-1;i>=1;i--){
      const candidate=parts.slice(0,i).join(' - ');
      if(knownChars.some(c=>c.toLowerCase()===candidate.toLowerCase()))return candidate;
    }
    // Fallback: everything before last " - "
    const lastDash=noExt.lastIndexOf(' - ');
    if(lastDash!==-1)return noExt.substring(0,lastDash).trim();
  }
  return null;
}

function fixContractionsForTTS(text){
  text=text.replace(/\u2019/g,"'").replace(/\u2018/g,"'");
  // F5 and Qwen both understand normal apostrophes. Removing them turns
  // "I'm" into "Im" and "don't" into "dont", which causes the shared
  // mobile mispronunciations heard during live speech.
  if(mobileTTSEngine==='f5'||mobileTTSEngine==='qwen-fast')return text;
  const contractions=[["aren't","arent"],["can't","cant"],["couldn't","couldnt"],["didn't","didnt"],
    ["doesn't","doesnt"],["don't","dont"],["hadn't","hadnt"],["hasn't","hasnt"],["haven't","havent"],
    ["isn't","isnt"],["it's","its"],["mustn't","mustnt"],["needn't","neednt"],["shan't","shant"],
    ["shouldn't","shouldnt"],["wasn't","wasnt"],["weren't","werent"],["won't","wont"],
    ["wouldn't","wouldnt"],["you're","youre"],["you've","youve"],["you'll","youll"],["you'd","youd"],
    ["they're","theyre"],["they've","theyve"],["they'll","theyll"],["they'd","theyd"],
    ["we're","were"],["we've","weve"],["we'll","well"],["we'd","wed"],
    ["I'm","Im"],["I've","Ive"],["I'll","Ill"],["I'd","Id"],
    ["he's","hes"],["she's","shes"],["it's","its"],["that's","thats"],["there's","theres"],
    ["here's","heres"],["what's","whats"],["who's","whos"],["how's","hows"]];
  for(const[c,r]of contractions)text=text.replace(new RegExp(c,'gi'),r);
  return text;
}

function splitAndQueue(text){
  text=text.replace(/<a\b[^>]*>[\s\S]*?<\/a>/gi,'')
           .replace(/\n*[\u{1F517}\uD83D\uDD17]*\s*Source:[^\n]*/gu,'')
           .replace(/<[^>]+>/g,' ')
           .replace(/\[([^\]]+)\]\([^)]*\)/g,'$1')
           .replace(/https?:\/\/\S+/g,'')
           .replace(/[\u{1F517}]/gu,'');
  const cleaned=text.trim()
    .replace(/\s*\u2014\s*/g,', ')
    .replace(/\u{1F4AF}/gu,'one hundred percent')
    .replace(/(\w)\s*(?:[\u{1F000}-\u{1FFFF}\u{1F900}-\u{1F9FF}\u{1FA00}-\u{1FAFF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]|[\uD800-\uDBFF][\uDC00-\uDFFF])+/gu,'$1.')
    .replace(/(?:[\u{1F000}-\u{1FFFF}\u{1F900}-\u{1F9FF}\u{1FA00}-\u{1FAFF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]|[\uD800-\uDBFF][\uDC00-\uDFFF])+/gu,'')
    .replace(/\*\*/g,'').replace(/\*/g,'').replace(/_/g,'')
    .replace(/(?:^|\s+)x{1,4}(?=\s*[.!?]*\s*$)/g,'').replace(/\s+([.!?])/g,'$1')
    .replace(/^[-*•>]\s+/,'').replace(/^\d+\.\s+/,'').replace(/\s*>\s*/g,'. ')
    .replace(/:/g,'. ')
    .replace(/\s*\(\s*/g,'. ').replace(/\s*\)\s*/g,'. ')
    .trim();
  if(cleaned.length===0)return;
  const withPunct=/[.!?]$/.test(cleaned)?cleaned:cleaned+'.';
  if(withPunct.length<=TTS_MAX_CHUNK_LENGTH){
    if(withPunct.length>2){
      ttsQueue.push(withPunct);
      if(!ttsProcessing&&ttsQueue.length>=TTS_START_THRESHOLD)processQueue();
    }
    return;
  }
  const subChunks=[];let remaining=withPunct;
  while(remaining.length>TTS_MAX_CHUNK_LENGTH){
    let splitAt=-1;
    const searchStr=remaining.substring(0,TTS_MAX_CHUNK_LENGTH);
    const commaIdx=searchStr.lastIndexOf(',');
    const dashIdx=searchStr.lastIndexOf(' — ');
    const spaceIdx=searchStr.lastIndexOf(' ');
    if(commaIdx>TTS_MAX_CHUNK_LENGTH*0.4)splitAt=commaIdx+1;
    else if(dashIdx>TTS_MAX_CHUNK_LENGTH*0.4)splitAt=dashIdx+3;
    else if(spaceIdx>TTS_MAX_CHUNK_LENGTH*0.4)splitAt=spaceIdx;
    else splitAt=TTS_MAX_CHUNK_LENGTH;
    subChunks.push(remaining.substring(0,splitAt).trim());
    remaining=remaining.substring(splitAt).trim();
  }
  if(remaining.length>2)subChunks.push(remaining);
  for(const sub of subChunks){
    if(sub.length<=2)continue;
    ttsQueue.push(/[.!?]$/.test(sub)?sub:sub+'.');
  }
  if(!ttsProcessing&&ttsQueue.length>=TTS_START_THRESHOLD)processQueue();
}

async function initTTSEngine(){
  try{
    const res=await fetch('/api/tts/engine');
    if(!res.ok)return;
    const data=await res.json();
    const engine=data.engine||'f5';
    mobileTTSEngine=engine;
    if(engine==='chatterbox'){
      TTS_MAX_CHUNK_LENGTH=150;
      TTS_FIRST_BATCH_MIN=60;
      TTS_BATCH_MIN=120;
    }else if(engine==='qwen-fast'){
      TTS_MAX_CHUNK_LENGTH=220;
      TTS_FIRST_BATCH_MIN=60;
      TTS_BATCH_MIN=160;
    }else{
      TTS_MAX_CHUNK_LENGTH=300;
      TTS_FIRST_BATCH_MIN=80;
      TTS_BATCH_MIN=180;
    }
    if(engine==='qwen-fast'&&(document.getElementById('mobile-voice-select')?.options.length||0)<=1){
      loadMobileVoices();
    }
    console.log(`\uD83D\uDD0A TTS engine: ${engine} \u2014 max=${TTS_MAX_CHUNK_LENGTH}, batch=${TTS_FIRST_BATCH_MIN}/${TTS_BATCH_MIN}`);
  }catch(e){/* leave defaults */}
}

// Queue a detected sentence via the streaming batcher. Holds short
// sentences until the running batch crosses the min-length threshold,
// then hands the whole batch to splitAndQueue. First batch uses a
// smaller threshold so audio starts fast; later batches use the larger
// one for smoother prosody. \u26A0\uFE0F DO NOT bypass this on the streaming
// path \u2014 sending one-sentence-at-a-time requests to F5 reintroduces
// the lower-quality streaming audio that this whole batcher fixes.
function batchAndQueue(sentence){
  if(!sentence)return;
  const trimmed=sentence.trim();
  if(trimmed.length<=2)return;
  if(mobileTTSEngine==='qwen-fast'){
    ttsFirstBatchSent=true;
    splitAndQueue(trimmed);
    return;
  }
  ttsPendingBatch=ttsPendingBatch?ttsPendingBatch+' '+trimmed:trimmed;
  const threshold=ttsFirstBatchSent?TTS_BATCH_MIN:TTS_FIRST_BATCH_MIN;
  if(ttsPendingBatch.length>=threshold)flushPendingBatch();
}

function flushPendingBatch(){
  if(!ttsPendingBatch)return;
  const batch=ttsPendingBatch;
  ttsPendingBatch='';
  ttsFirstBatchSent=true;
  splitAndQueue(batch);
}

// Strip fenced ```...``` and inline `...` code from a streaming chunk so the
// TTS engine never reads code aloud. State persists across chunks because
// a fenced block can span chunks and the ``` fence itself can split at a
// chunk boundary.
function stripCodeForTTS(chunk){
  chunk=ttsBacktickTail+chunk;
  ttsBacktickTail='';
  const trail=chunk.match(/`{1,2}$/);
  if(trail){ttsBacktickTail=trail[0];chunk=chunk.slice(0,-trail[0].length);}
  let out='',i=0;
  while(i<chunk.length){
    if(chunk[i]==='`'&&chunk[i+1]==='`'&&chunk[i+2]==='`'){
      ttsInsideCodeBlock=!ttsInsideCodeBlock;
      i+=3;
      if(ttsInsideCodeBlock){
        while(i<chunk.length&&chunk[i]!=='\n')i++;
        if(i<chunk.length)i++;
      }
      continue;
    }
    if(ttsInsideCodeBlock){i++;continue;}
    if(chunk[i]==='`'){
      const close=chunk.indexOf('`',i+1);
      if(close===-1){ttsBacktickTail=chunk.substring(i)+ttsBacktickTail;return out;}
      i=close+1;continue;
    }
    out+=chunk[i];i++;
  }
  return out;
}

function bufferTextForTTS(chunk){
  if(!ttsEnabled||!chunk)return;
  // Reset code-block state at start of new response, BEFORE stripCodeForTTS
  // so stale state from a prior response can't gut the first chunk.
  if(ttsSentenceBuffer===''&&ttsQueue.length===0&&!ttsProcessing&&!ttsPendingBatch){
    ttsInsideCodeBlock=false;
    ttsBacktickTail='';
  }
  chunk=stripCodeForTTS(chunk);
  if(!chunk)return;
  chunk=chunk.replace(/<a\b[^>]*>[\s\S]*?<\/a>/gi,'')
             .replace(/\n*[\u{1F517}\uD83D\uDD17]*\s*Source:[^\n]*/gu,'')
             .replace(/<[^>]+>/g,' ')
             .replace(/\[([^\]]+)\]\([^)]*\)/g,'$1')
             .replace(/\]\([^)]*\)/g,'')
             .replace(/https?:\/\/[^\s\])"'>]+/g,'')
             .replace(/[\u{1F517}\uD83D\uDD17]/gu,'');
  if(ttsSentenceBuffer===''&&ttsQueue.length===0&&!ttsProcessing&&!ttsPendingBatch){
    ttsStreamingComplete=false;
    ttsFirstBatchSent=false;
  }
  chunk=fixContractionsForTTS(chunk);
  chunk=chunk.replace(/\.{3}/g,'. ').replace(/\u2026/g,'. ').replace(/\.{2}/g,'. ');
  chunk=chunk.replace(/\s*\(\s*/g,'. ').replace(/\s*\)\s*/g,'. ');
  chunk=chunk.replace(/^>\s*/gm,'').replace(/\s*>\s*/g,'. ');
  chunk=chunk.replace(/\u{1F4AF}/gu,'one hundred percent');
  chunk=chunk.replace(/(\w)\s*(?:[\u{1F000}-\u{1FFFF}\u{1F900}-\u{1F9FF}\u{1FA00}-\u{1FAFF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]|[\uD800-\uDBFF][\uDC00-\uDFFF])+/gu,'$1.');
  chunk=chunk.replace(/(?:[\u{1F000}-\u{1FFFF}\u{1F900}-\u{1F9FF}\u{1FA00}-\u{1FAFF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]|[\uD800-\uDBFF][\uDC00-\uDFFF])+/gu,'');
  ttsSentenceBuffer+=chunk;
  const lines=ttsSentenceBuffer.split('\n');
  ttsSentenceBuffer=lines.pop();
  // Paragraph break = natural prosody boundary \u2014 flush any pending
  // batch before queuing the new line so we don't merge across it.
  for(const line of lines){
    flushPendingBatch();
    batchAndQueue(line);
  }
  // Emoji-as-sentence-terminator: the model frequently ends a sentence
  // with an emoji (no trailing punctuation). Without this branch the
  // sentence stays in the buffer until the next newline and merges
  // with whatever comes next.
  const sentenceRegex=/[^.!?]+(?:[.!?]+|(?:[\u{1F000}-\u{1FFFF}\u{1F300}-\u{1FAFF}\u{1F900}-\u{1F9FF}\u{1FA00}-\u{1FAFF}\u2600-\u27BF])+)[)"'*_]*\s*/gu;
  let match,lastIndex=0;
  while((match=sentenceRegex.exec(ttsSentenceBuffer))!==null){
    batchAndQueue(match[0]);
    lastIndex=match.index+match[0].length;
  }
  if(lastIndex>0)ttsSentenceBuffer=ttsSentenceBuffer.substring(lastIndex);
  // Qwen mobile live speech normally waits for a complete sentence. If the
  // model opens with one very long sentence, cap only the first wait at the
  // existing 60-character Qwen opening threshold and cut on a natural word
  // boundary. Native completed-WAV decoding still keeps the audio clean.
  if(mobileTTSEngine==='qwen-fast'&&!ttsFirstBatchSent&&ttsSentenceBuffer.length>=TTS_FIRST_BATCH_MIN){
    const openingWindow=ttsSentenceBuffer.substring(0,TTS_FIRST_BATCH_MIN);
    let splitAt=Math.max(openingWindow.lastIndexOf(','),openingWindow.lastIndexOf(';'),openingWindow.lastIndexOf(':'));
    if(splitAt<TTS_FIRST_BATCH_MIN*0.6)splitAt=openingWindow.lastIndexOf(' ');
    if(splitAt<1)splitAt=TTS_FIRST_BATCH_MIN;
    const opening=ttsSentenceBuffer.substring(0,splitAt).replace(/[,:;\s]+$/,'').trim();
    ttsSentenceBuffer=ttsSentenceBuffer.substring(splitAt).replace(/^\s+/,'');
    if(opening.length>2)batchAndQueue(opening);
  }
}

function flushTTSBuffer(){
  if(!ttsEnabled)return;
  const remaining=ttsSentenceBuffer.trim()
    .replace(/(\w)\s*(?:[\u{1F000}-\u{1FFFF}\u{1F900}-\u{1F9FF}\u{1FA00}-\u{1FAFF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]|[\uD800-\uDBFF][\uDC00-\uDFFF])+/gu,'$1.')
    .replace(/(?:[\u{1F000}-\u{1FFFF}\u{1F900}-\u{1F9FF}\u{1FA00}-\u{1FAFF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]|[\uD800-\uDBFF][\uDC00-\uDFFF])+/gu,'')
    .replace(/\*\*/g,'').replace(/\*/g,'').replace(/_/g,'').trim();
  if(remaining.length>2)batchAndQueue(remaining);
  ttsSentenceBuffer='';
  // Drop any held-back backtick fragments — never spoken aloud regardless
  // of whether the closing ``` ever arrived.
  ttsBacktickTail='';
  ttsInsideCodeBlock=false;
  flushPendingBatch();
  setTimeout(()=>{
    ttsStreamingComplete=true;
    if(!ttsProcessing&&ttsQueue.length>0)processQueue();
  },150);
}

function stopMobileQwen(){
  mobileQwenLiveRun++;
  if(mobileQwenAbort){mobileQwenAbort.abort();mobileQwenAbort=null;}
  mobileQwenSources.forEach(s=>{try{s.stop();}catch(e){}});mobileQwenSources=[];mobileQwenNext=0;
  if(mobileQwenCtx){mobileQwenCtx.close().catch(()=>{});mobileQwenCtx=null;}
}

async function streamMobileQwen(sentence){
  if(!mobileQwenCtx||mobileQwenCtx.state==='closed'){mobileQwenCtx=new AudioContext();mobileQwenNext=0;}
  await mobileQwenCtx.resume();mobileQwenAbort=new AbortController();
  const r=await fetch('/api/tts/generate_stream',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:sentence,voice:ttsVoice||'Sol',language:'English',chunk_size:2}),signal:mobileQwenAbort.signal});
  if(!r.ok)throw new Error((await r.json().catch(()=>({}))).error||`Qwen Fast returned ${r.status}`);
  const reader=r.body.getReader(),FRAME=3840;let header=44,carry=new Uint8Array(0),samples=[];
  const schedule=a=>{if(!a.length||!mobileQwenCtx)return;const b=mobileQwenCtx.createBuffer(1,a.length,24000),c=b.getChannelData(0);for(let i=0;i<a.length;i++)c[i]=a[i]/32768;const s=mobileQwenCtx.createBufferSource();s.buffer=b;s.connect(mobileQwenCtx.destination);if(!mobileQwenNext)mobileQwenNext=mobileQwenCtx.currentTime+.08;else if(mobileQwenNext<mobileQwenCtx.currentTime+.015)mobileQwenNext=mobileQwenCtx.currentTime+.06;s.start(mobileQwenNext);mobileQwenNext+=a.length/24000;mobileQwenSources.push(s);s.onended=()=>{const i=mobileQwenSources.indexOf(s);if(i>=0)mobileQwenSources.splice(i,1);};};
  while(ttsEnabled){const {done,value}=await reader.read();if(done)break;let bytes=value;if(header){const n=Math.min(header,bytes.length);bytes=bytes.slice(n);header-=n;}if(!bytes.length)continue;if(carry.length){const j=new Uint8Array(carry.length+bytes.length);j.set(carry);j.set(bytes,carry.length);bytes=j;}const even=bytes.length-bytes.length%2,v=new DataView(bytes.buffer,bytes.byteOffset,even);for(let i=0;i<even;i+=2)samples.push(v.getInt16(i,true));carry=even<bytes.length?bytes.slice(even):new Uint8Array(0);while(samples.length>=FRAME)schedule(samples.splice(0,FRAME));}schedule(samples);mobileQwenAbort=null;
}

async function processMobileQwen(){
  while(ttsEnabled){if(ttsQueue.length){try{await streamMobileQwen(ttsQueue.shift());}catch(e){if(e.name!=='AbortError')console.error('Qwen Fast stream failed:',e);}continue;}if(ttsStreamingComplete)break;await new Promise(r=>setTimeout(r,25));}
  if(mobileQwenCtx&&ttsEnabled){const ms=Math.max(0,(mobileQwenNext-mobileQwenCtx.currentTime)*1000);if(ms)await new Promise(r=>setTimeout(r,ms));}
  ttsProcessing=false;isPlayingAudio=false;const cb=ttsOnComplete;ttsOnComplete=null;if(cb)cb();const replayBtn=document.querySelector('.mobile-replay-btn.active');if(replayBtn)setReplayBtnIdle(replayBtn);
}

async function fetchMobileQwenWav(sentence,run){
  for(let attempt=0;attempt<2;attempt++){
    const controller=new AbortController();
    mobileQwenAbort=controller;
    try{
      const response=await fetch('/api/tts/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:sentence,voice:ttsVoice||'Sol'}),signal:controller.signal});
      if(response.ok){
        const blob=await response.blob();
        if(run!==mobileQwenLiveRun)return null;
        return URL.createObjectURL(blob);
      }
      console.warn(`Qwen Fast WAV fetch ${response.status} (attempt ${attempt+1})`);
    }catch(e){
      if(e.name==='AbortError')throw e;
      console.warn(`Qwen Fast WAV fetch error (attempt ${attempt+1}):`,e);
    }finally{
      if(mobileQwenAbort===controller)mobileQwenAbort=null;
    }
    if(attempt===0)await new Promise(r=>setTimeout(r,200));
  }
  return null;
}

async function processMobileQwenLiveWav(){
  const run=++mobileQwenLiveRun;
  let nextAudio=null;
  while(ttsEnabled&&run===mobileQwenLiveRun){
    if(!nextAudio){
      if(ttsQueue.length)nextAudio=fetchMobileQwenWav(ttsQueue.shift(),run);
      else if(ttsStreamingComplete)break;
      else{await new Promise(r=>setTimeout(r,25));continue;}
    }

    let audioUrl;
    try{audioUrl=await nextAudio;}catch(e){if(e.name!=='AbortError')console.error('Qwen Fast WAV failed:',e);break;}
    nextAudio=null;
    if(!audioUrl)continue;
    if(!ttsEnabled||run!==mobileQwenLiveRun){URL.revokeObjectURL(audioUrl);continue;}

    await new Promise(resolve=>{
      const audio=new Audio(audioUrl);
      currentAudio=audio;isPlayingAudio=true;
      const prefetchInterval=setInterval(()=>{
        if(!nextAudio&&ttsQueue.length&&ttsEnabled&&run===mobileQwenLiveRun){
          nextAudio=fetchMobileQwenWav(ttsQueue.shift(),run);
        }
      },25);
      let cleaned=false;
      const cleanup=()=>{
        if(cleaned)return;
        cleaned=true;
        clearInterval(prefetchInterval);
        URL.revokeObjectURL(audioUrl);
        if(currentAudio===audio)currentAudio=null;
        isPlayingAudio=false;
        resolve();
      };
      audio.onended=cleanup;
      audio.onerror=cleanup;
      audio.onpause=cleanup;
      audio.play().catch(cleanup);
    });
  }

  if(run!==mobileQwenLiveRun)return;
  ttsProcessing=false;isPlayingAudio=false;const cb=ttsOnComplete;ttsOnComplete=null;if(cb)cb();const replayBtn=document.querySelector('.mobile-replay-btn.active');if(replayBtn)setReplayBtnIdle(replayBtn);
}

async function processQueue(){
  if(ttsProcessing)return;
  ttsProcessing=true;

  if(mobileTTSEngine==='qwen-fast'){
    if(!ttsStreamingComplete)await processMobileQwenLiveWav();
    else await processMobileQwen();
    return;
  }

  async function fetchAudio(sentence){
    for(let attempt=0;attempt<2;attempt++){
      try{
        const response=await fetch('/api/tts/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:sentence,voice:ttsVoice||'Sol'})});
        if(response.ok){const blob=await response.blob();return URL.createObjectURL(blob);}
        console.warn(`TTS fetch ${response.status} (attempt ${attempt+1})`);
      }catch(err){console.warn(`TTS fetch error (attempt ${attempt+1}):`,err);}
      if(attempt===0)await new Promise(r=>setTimeout(r,200));
    }
    return null;
  }

  if(ttsQueue.length===0){ttsProcessing=false;const cb=ttsOnComplete;ttsOnComplete=null;if(cb)cb();return;}

  const prefetchBuffer=[];
  const PREFETCH_DEPTH=3;
  const topUp=()=>{while(prefetchBuffer.length<PREFETCH_DEPTH&&ttsQueue.length>0)prefetchBuffer.push(fetchAudio(ttsQueue.shift()));};
  topUp();

  while(true){
    if(!ttsEnabled)break;
    const audioUrl=prefetchBuffer.length>0?await prefetchBuffer.shift():null;
    topUp();
    if(audioUrl){
      await new Promise((resolve)=>{
        currentAudio=new Audio(audioUrl);
        isPlayingAudio=true;
        // Keep the fetch pipeline saturated while audio plays — new
        // sentences arriving from the streaming buffer need to start
        // fetching immediately, not wait for playback to end.
        const prefetchInterval=setInterval(topUp,50);
        const cleanup=()=>{clearInterval(prefetchInterval);URL.revokeObjectURL(audioUrl);isPlayingAudio=false;currentAudio=null;resolve();};
        currentAudio.onended=cleanup;
        currentAudio.onerror=cleanup;
        currentAudio.play().catch(cleanup);
      });
      topUp();
    }
    if(prefetchBuffer.length===0&&ttsQueue.length===0){
      if(ttsStreamingComplete)break;
      // Streaming still in flight — wait briefly for more sentences
      // to arrive from bufferTextForTTS, then re-check.
      await new Promise(r=>setTimeout(r,25));
      if(ttsQueue.length>0)topUp();
      else if(ttsStreamingComplete)break;
    }
  }

  ttsProcessing=false;
  isPlayingAudio=false;
  const cb=ttsOnComplete;ttsOnComplete=null;if(cb)cb();
  const replayBtn=document.querySelector('.mobile-replay-btn.active');
  if(replayBtn)setReplayBtnIdle(replayBtn);
}

function stopAllAudio(){

function addBubble(role,sender,text,isoTimestamp){
  const chat=document.getElementById('chat');
  const wrap=document.createElement('div');wrap.className='msg-wrap '+(role==='user'?'user':'ai');
  const s=document.createElement('div');s.className='msg-sender';s.textContent=sender;
  const b=document.createElement('div');b.className='msg-bubble';
  if(role==='ai'&&typeof marked!=='undefined'){b.innerHTML=marked.parse(text);}
  else{b.textContent=text;}
  const t=document.createElement('div');t.className='msg-time';t.textContent=isoTimestamp?fmtTime(new Date(isoTimestamp)):fmtTime(new Date());
  wrap.appendChild(s);wrap.appendChild(b);
  // Replay button for AI messages
  if(role==='ai'){
    const replayRow=document.createElement('div');
    replayRow.style.cssText='display:flex;gap:6px;margin-top:4px;padding:0 4px;';
    const replayBtn=document.createElement('button');
    replayBtn.className='mobile-replay-btn';
    replayBtn.style.cssText='background:none;border:none;color:var(--text-dim);font-size:13px;cursor:pointer;padding:2px 4px;border-radius:4px;display:flex;align-items:center;gap:4px;transition:color 0.2s;';
    replayBtn.innerHTML=replaySVG_g+' Replay';
    replayBtn.onclick=(e)=>{
      e.stopPropagation();
      if(isPlayingAudio||ttsProcessing||replayTimeout){
        stopAllAudio();
        return;
      }
      document.querySelectorAll('.mobile-replay-btn.active').forEach(b=>setReplayBtnIdle(b));
      setReplayBtnActive(replayBtn);
      replayTimeout=setTimeout(()=>{
        replayTimeout=null;
        const lines=text.replace(/\*\*/g,'').replace(/\*/g,'').replace(/_/g,'').replace(/#{1,6}\s/g,'').split('\n');
        for(const line of lines){const t=line.trim();if(t.length>2)splitAndQueue(t);}
        ttsStreamingComplete=true;
        if(ttsQueue.length>0)processQueue();
      },150);
    };
    replayRow.appendChild(replayBtn);
    wrap.appendChild(replayRow);
  }
  wrap.appendChild(t);
  attachLongPress(wrap, text, role);
  chat.insertBefore(wrap,document.getElementById('typing-indicator'));scrollToBottom();
}

function confirmDeleteChat(filename, title, itemEl){

  const delBtn=document.createElement('button');
  delBtn.className='del-btn';
  delBtn.textContent='🗑 Delete';

  itemEl.style.background='rgba(180,60,60,0.15)';
  itemEl.appendChild(delBtn);
  const autoDismiss=setTimeout(()=>{
    delBtn.remove();
    itemEl.style.background=filename===mobileChatFilename?'rgba(74,127,193,0.1)':'';
  },4000);
  delBtn.onclick=async(e)=>{
    e.stopPropagation();
    clearTimeout(autoDismiss);
    try{
      const res=await fetch('/chats/delete/'+encodeURIComponent(filename),{method:'DELETE'});
      if(res.ok){
        if(filename===mobileChatFilename){
          mobileChatFilename=null;
          localStorage.removeItem('mobile_chat_filename');
          localStorage.removeItem('mobile_chat_character');
          chatHistory=[];
          document.getElementById('chat').innerHTML='<div id="typing-indicator"><span></span><span></span><span></span></div>';
        }
        itemEl.remove();
        showToast('Chat deleted');
      }else{
        showToast('⚠️ Delete failed');
        delBtn.remove();
        itemEl.style.background='';
      }
    }catch(e){showToast('⚠️ Error: '+e.message);delBtn.remove();itemEl.style.background='';}
  };
}

async function loadMobileVoices(){
  try{
    const res=await fetch('/api/tts/voices');
    if(!res.ok)throw new Error('Voice endpoint returned '+res.status);
    const data=await res.json();
    const voices=data.voices||[];
    const sel=document.getElementById('mobile-voice-select');
    sel.innerHTML='';
    voices.forEach(v=>{
      const o=document.createElement('option');
      o.value=v.name;o.textContent=v.label||v.name;
      if(v.name===ttsVoice)o.selected=true;
      sel.appendChild(o);
    });
    clearTimeout(loadMobileVoices.retryTimer);
    if(data.engine==='qwen-fast'&&data.backend_online===false){
      loadMobileVoices.retryCount=(loadMobileVoices.retryCount||0)+1;
      if(loadMobileVoices.retryCount<=45)loadMobileVoices.retryTimer=setTimeout(loadMobileVoices,2000);
      return;
    }
    loadMobileVoices.retryCount=0;
    if(voices.length&&!voices.some(v=>v.name===ttsVoice)){
      const fallback=voices.find(v=>v.name==='Sol_American_Female')||voices[0];
      setMobileVoice(fallback.name);
      sel.value=ttsVoice;
    }
  }catch(e){
    console.warn('Voice load failed:',e);
    clearTimeout(loadMobileVoices.retryTimer);
    loadMobileVoices.retryCount=(loadMobileVoices.retryCount||0)+1;
    if(loadMobileVoices.retryCount<=45)loadMobileVoices.retryTimer=setTimeout(loadMobileVoices,2000);
  }
}

function setMobileVoice(name){
  if(!name)return;
  ttsVoice=name;
  localStorage.setItem('tts-voice',name);

      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({voice:name})
    }).catch(e=>console.warn('Voice save failed:',e));
  }
  showToast('Voice: '+name);
}

async function saveChatToDisk(){
  await ensureChatFile();
  if(!mobileChatFilename)return;
  if(window.mobileSaving){return;}
  window.mobileSaving=true;
  try{
    // Deduplicate — same protection as desktop
    const seen=new Set();
    const deduped=[];
    for(const m of chatHistory){
      const key=m.role+':'+m.content;
      if(!seen.has(key)){seen.add(key);deduped.push(m);}
    }
    chatHistory=deduped;
    // Remove consecutive assistant messages
    for(let i=chatHistory.length-1;i>0;i--){
      if(chatHistory[i].role==='assistant'&&chatHistory[i-1].role==='assistant'){
        chatHistory.splice(i,1);
      }
    }
    const messages=chatHistory.map(m=>({
      role:m.role,
      content:m.content,
      speaker:m.speaker||(m.role==='user'?userName:characterName),
      ...(m.timestamp?{timestamp:m.timestamp}:{})
    }));
    const res=await fetch('/chats/save',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({filename:mobileChatFilename,messages})});
    if(!res.ok)console.error('Save failed:',res.status);
  }catch(e){console.error('Save failed:',e);}
  finally{window.mobileSaving=false;}
}

function showDeletePopover(wrap, text, role){
  closePopover();

  const overlay=document.createElement('div');
  overlay.id='msg-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9998;';
  overlay.onclick=closePopover;

  const pop=document.createElement('div');
  pop.id='msg-popover';
  pop.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;z-index:9999;min-width:220px;max-width:85vw;box-shadow:0 8px 32px rgba(0,0,0,0.6);';

  const preview=document.createElement('div');
  preview.style.cssText='color:var(--text-dim);font-size:12px;margin-bottom:14px;max-height:60px;overflow:hidden;';
  const plainText=text.replace(/<[^>]+>/g,'');
  preview.textContent=plainText.substring(0,80)+(plainText.length>80?'...':'');
  pop.appendChild(preview);

  const btnRow=document.createElement('div');
  btnRow.style.cssText='display:flex;flex-direction:column;gap:8px;';

  // Regenerate — only for AI messages
  if(role==='ai'){
    const regenBtn=document.createElement('button');
    regenBtn.textContent='🔄 Regenerate';
    regenBtn.style.cssText='background:#1a2a3a;border:1px solid var(--accent);color:var(--accent);border-radius:8px;padding:10px;font-size:14px;cursor:pointer;font-weight:600;';
    regenBtn.onclick=()=>{closePopover();regenerateLastResponse();};
    btnRow.appendChild(regenBtn);
  }

  const delBtn=document.createElement('button');
  delBtn.textContent='🗑 Delete Message';
  delBtn.style.cssText='background:#3a1a1a;border:1px solid #6a2a2a;color:#e88;border-radius:8px;padding:10px;font-size:14px;cursor:pointer;';
  delBtn.onclick=async()=>{
    closePopover();
    // Find and remove from chatHistory - match by content, remove that entry AND
    // anything after it that was part of the same exchange if it's a user message
    const pidx=chatHistory.findIndex(m=>m.content===plainText||m.content===text);
    if(pidx!==-1){
      // If deleting a user message, also remove the following assistant response
      if(chatHistory[pidx].role==='user'&&chatHistory[pidx+1]?.role==='assistant'){
        chatHistory.splice(pidx,2);
        // Also remove the next bubble from DOM
        const nextWrap=wrap.nextElementSibling;
        if(nextWrap&&nextWrap.classList.contains('msg-wrap'))nextWrap.remove();
      } else {
        chatHistory.splice(pidx,1);
      }
    }
    wrap.remove();
    await saveChatToDisk();
    showToast('Message deleted');
  };

  const cancelBtn=document.createElement('button');
  cancelBtn.textContent='Cancel';
  cancelBtn.style.cssText='background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);border-radius:8px;padding:10px;font-size:14px;cursor:pointer;';
  cancelBtn.onclick=closePopover;

  btnRow.appendChild(delBtn);
  btnRow.appendChild(cancelBtn);
  pop.appendChild(btnRow);

  document.body.appendChild(overlay);
  document.body.appendChild(pop);
}
