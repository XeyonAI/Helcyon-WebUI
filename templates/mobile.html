function fmtTime(d){
  if(!d||isNaN(d.getTime()))return '';
  const now=new Date();
  const hh=d.getHours().toString().padStart(2,'0');
  const mm=d.getMinutes().toString().padStart(2,'0');
  const time=hh+':'+mm;
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const msgDay=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const diff=(today-msgDay)/86400000;
  if(diff<1)return 'Today, '+time;
  if(diff<2)return 'Yesterday, '+time;
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return days[d.getDay()]+' '+d.getDate()+' '+months[d.getMonth()]+', '+time;
}
// ── Regenerate / Resume / Continue ───────────────────────────────
async function regenerateLastResponse(){
  // Find last user message index in chatHistory
  let lastUserIdx=-1;
  for(let i=chatHistory.length-1;i>=0;i--){
    if(chatHistory[i].role==='user'){lastUserIdx=i;break;}
  }
  if(lastUserIdx===-1){showToast('No user message to regenerate from');return;}
  // Splice everything after last user message (removes any assistant response/error stub)
  chatHistory.splice(lastUserIdx+1);
  // Remove all bubbles after the last user bubble in the DOM
  const allWraps=Array.from(document.getElementById('chat').querySelectorAll('.msg-wrap'));
  let lastUserDomIdx=-1;
  for(let i=0;i<allWraps.length;i++){
    if(allWraps[i].classList.contains('user'))lastUserDomIdx=i;
  }
  if(lastUserDomIdx!==-1){
    for(let i=lastUserDomIdx+1;i<allWraps.length;i++){allWraps[i].remove();}
  }
  await saveChatToDisk();
  showTyping(true);setStatus('Thinking...');
  try{
    const res=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({character:charFilename,user_name:userName,current_chat_filename:null,
        conversation_history:chatHistory,author_note:'',temperature:0.8,max_tokens:4096,stop:[]})});
    if(!res.ok){showTyping(false);showToast('⚠️ Server error');return;}
    const ct=res.headers.get('content-type')||'';
    if(ct.includes('text/event-stream')&&res.body){await handleStream(res);}
    else{const d=await res.json();const reply=d.text||'';const rgTs=new Date().toISOString();showTyping(false);addBubble('ai',characterName,reply,rgTs);chatHistory.push({role:'assistant',content:reply,speaker:characterName,timestamp:rgTs});await saveChatToDisk();if(ttsEnabled)speakText(reply);setStatus('Ready');}
  }catch(e){showTyping(false);showToast('⚠️ Error: '+e.message);}
}
async function resumeLastResponse() {
  if (!mobileChatFilename) { showToast('⚠️ No chat file to resume from'); return; }
  showToast('🔄 Fetching full response from server...');
  try {
    const res = await fetch('/chats/open/' + encodeURIComponent(mobileChatFilename));
    if (!res.ok) { showToast('⚠️ Could not load chat file'); return; }
    const data = await res.json();
    const msgs = data.messages || [];
    // Find last assistant message from file
    let lastAI = null;
    for (let i = msgs.length - 1; i >= 0; i--) {
      if (msgs[i].role === 'assistant') { lastAI = msgs[i]; break; }
    }
    if (!lastAI) { showToast('⚠️ No assistant message found in file'); return; }
    const fullText = lastAI.content || '';
    // Find last AI bubble in the DOM and replace its content
    const bubbles = document.querySelectorAll('.msg-wrap.ai');
    if (bubbles.length) {
      const lastBubble = bubbles[bubbles.length - 1];
      const textDiv = lastBubble.querySelector('.msg-bubble > div');
      if (textDiv) {
        if (typeof marked !== 'undefined') { textDiv.innerHTML = marked.parse(fullText); }
        else { textDiv.textContent = fullText; }
      }
      // Also update chatHistory last assistant entry
      for (let i = chatHistory.length - 1; i >= 0; i--) {
        if (chatHistory[i].role === 'assistant') { chatHistory[i].content = fullText; break; }
      }
      scrollToBottom();
      showToast('✅ Full response restored');
    } else {
      showToast('⚠️ No AI bubble to update');
    }
  } catch(e) { showToast('⚠️ Resume failed: ' + e.message); }
}

async function continueResponse() {
  // Sends a nudge so the model picks up where it left off
  const lastAI = chatHistory.slice().reverse().find(m => m.role === 'assistant');
  if (!lastAI) { showToast('⚠️ Nothing to continue'); return; }
  // Check if it looks truncated — ends mid-sentence (no terminal punctuation)
  const tail = (lastAI.content || '').trimEnd();
  const terminated = /[.!?…"'»\]]$/.test(tail);
  if (terminated) {
    showToast('Response looks complete — use Resume if text is missing');
    return;
  }
  await sendMessage('[Please continue from where you left off]');
}

// ── Mobile Cloud Backend (Local / OpenAI / Anthropic picker) ─────
// Connecting a cloud provider is a TWO-step persist: save the provider's
// backend_mode (carrying its existing key/model/base_url so they aren't wiped),
// THEN flip cloud_api_enabled=true so the /chat cloud gate lets it through.
// Saving the mode alone forces cloud_api_enabled=false, which the gate blocks.
// Local persists via /save_backend_mode (which also clears cloud_api_enabled).
let _mobileBackend = {
  mode: 'local', cloud: false,
  openai:    { key: '', model: '', base: '' },
  anthropic: { key: '', model: '', base: '' },
};
let _pendingCloudMode = null;

async function checkMobileBackend() {
  try {
    const [oa, an] = await Promise.all([
      fetch('/get_openai_settings').then(r => r.json()),
      fetch('/get_anthropic_settings').then(r => r.json()),
    ]);
    _mobileBackend.mode  = oa.backend_mode || 'local';
    _mobileBackend.cloud = !!oa.cloud_api_enabled;
    _mobileBackend.openai    = { key: oa.openai_api_key || '',    model: oa.openai_model || '',    base: oa.openai_base_url || '' };
    _mobileBackend.anthropic = { key: an.anthropic_api_key || '', model: an.anthropic_model || '', base: an.anthropic_base_url || '' };
  } catch(e) { /* silent */ }
  renderMobileBackend();
}

function renderMobileBackend() {
  const mode = _mobileBackend.mode;
  const cloudActive = (mode === 'openai' || mode === 'anthropic') && _mobileBackend.cloud;
  const isOA = mode === 'openai';

  // Header button: icon reflects mode, lights up when a cloud backend is live.
  const btn = document.getElementById('mobile-backend-btn');
  if (btn) {
    btn.textContent = isOA ? '☁️' : (mode === 'anthropic' ? '🧠' : '🔌');
    if (cloudActive) {
      const c = isOA ? ['rgba(0,180,100,0.25)','rgba(0,200,100,0.5)','#4dffaa']
                     : ['rgba(200,140,60,0.25)','rgba(220,160,80,0.5)','#e0a060'];
      btn.style.background = c[0]; btn.style.borderColor = c[1]; btn.style.color = c[2];
    } else {
      btn.style.background = 'var(--surface2)'; btn.style.borderColor = 'var(--border)'; btn.style.color = 'var(--text-dim)';
    }
  }

  // Active-cloud banner.
  const banner = document.getElementById('mobile-cloud-banner');
  if (banner) {
    if (cloudActive) {
      const model = isOA ? _mobileBackend.openai.model : _mobileBackend.anthropic.model;
      banner.style.display = 'flex';
      banner.style.background = isOA ? 'rgba(0,180,100,0.15)' : 'rgba(200,140,60,0.15)';
      banner.style.borderBottomColor = isOA ? 'rgba(0,200,100,0.3)' : 'rgba(220,160,80,0.35)';
      const dot = document.getElementById('mobile-cloud-dot');
      dot.style.background = isOA ? '#00e87a' : '#f0b060';
      dot.style.boxShadow  = '0 0 6px ' + (isOA ? '#00e87a' : '#f0b060');
      const lab = document.getElementById('mobile-cloud-label');
      lab.textContent = isOA ? '☁️ OpenAI' : '🧠 Anthropic';
      lab.style.color = isOA ? '#4dffaa' : '#e0a060';
      const mod = document.getElementById('mobile-cloud-model');
      mod.textContent = model || '';
      mod.style.color = isOA ? '#2aaa66' : '#b07a40';
    } else {
      banner.style.display = 'none';
    }
  }

  // Picker checkmarks.
  ['local','openai','anthropic'].forEach(m => {
    const c = document.getElementById('backend-check-' + m);
    if (c) c.textContent = (m === mode) ? '✓' : '';
  });
}

function openBackendPicker() { renderMobileBackend(); document.getElementById('mobile-backend-modal').style.display = 'flex'; }
function closeBackendPicker() { document.getElementById('mobile-backend-modal').style.display = 'none'; }

async function selectMobileBackend(mode) {
  if (mode === 'local') {
    closeBackendPicker();
    try {
      const res  = await fetch('/save_backend_mode', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ backend_mode:'local' }) });
      const data = await res.json().catch(() => ({}));
      if (res.ok && data.backend_mode === 'local') {
        _mobileBackend.mode = 'local'; _mobileBackend.cloud = false;
        renderMobileBackend(); showToast('🖥️ Switched to local');
      } else { showToast('⚠️ Failed to switch to local'); }
    } catch(e) { showToast('⚠️ Could not reach server'); }
    return;
  }

  // Cloud provider — require a key, then confirm the data-sharing warning.
  const key = (mode === 'openai') ? _mobileBackend.openai.key : _mobileBackend.anthropic.key;
  if (!key) {
    showToast('⚠️ No ' + (mode === 'openai' ? 'OpenAI' : 'Anthropic') + ' API key — set it in the desktop config page');
    return;
  }
  // Tapping the already-connected provider disconnects back to local.
  if (_mobileBackend.mode === mode && _mobileBackend.cloud) { closeBackendPicker(); selectMobileBackend('local'); return; }

  _pendingCloudMode = mode;
  closeBackendPicker();
  const isOA = mode === 'openai';
  document.getElementById('mobile-cloud-confirm-title').textContent = 'Switch to ' + (isOA ? 'OpenAI' : 'Anthropic') + '?';
  const prov = document.getElementById('mobile-cloud-confirm-provider');
  prov.textContent = isOA ? "OpenAI's servers" : "Anthropic's servers";
  prov.style.color = isOA ? '#7ab4f5' : '#e0a060';
  document.getElementById('mobile-cloud-confirm').style.display = 'flex';
}

function closeMobileCloudConfirm() { _pendingCloudMode = null; document.getElementById('mobile-cloud-confirm').style.display = 'none'; }

async function confirmMobileCloud() {
  const mode = _pendingCloudMode;
  document.getElementById('mobile-cloud-confirm').style.display = 'none';
  if (!mode) return;
  try {
    // 1) Persist provider mode, carrying existing key/model/base so saving
    //    doesn't reset them (the save route rewrites all of its own fields).
    if (mode === 'openai') {
      await fetch('/save_openai_settings', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ backend_mode:'openai', openai_api_key:_mobileBackend.openai.key, openai_model:_mobileBackend.openai.model, openai_base_url:_mobileBackend.openai.base }) });
    } else {
      await fetch('/save_anthropic_settings', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ backend_mode:'anthropic', anthropic_api_key:_mobileBackend.anthropic.key, anthropic_model:_mobileBackend.anthropic.model, anthropic_base_url:_mobileBackend.anthropic.base }) });
    }
    // 2) Enable the cloud master switch so the /chat gate passes.
    const res  = await fetch('/cloud_api_enabled', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ enabled:true }) });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.cloud_api_enabled) { showToast('⚠️ Failed to connect'); await checkMobileBackend(); _pendingCloudMode = null; return; }
    _mobileBackend.mode = mode; _mobileBackend.cloud = true;
    renderMobileBackend();
    const m = (mode === 'openai') ? (_mobileBackend.openai.model || 'gpt-4o') : (_mobileBackend.anthropic.model || 'claude');
    showToast((mode === 'openai' ? '☁️ Connected to OpenAI — ' : '🧠 Connected to Anthropic — ') + m);
  } catch(e) {
    showToast('⚠️ Failed to connect'); await checkMobileBackend();
  }
  _pendingCloudMode = null;
}

async function disconnectMobileCloud() { await selectMobileBackend('local'); }
</script>
</body>
</html>
